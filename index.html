<!DOCTYPE html>

<head>

<title>Umut Deveci | Digital Business Card</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:#eef3f8;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    width:100%;
    max-width:390px;
    background:#fff;
    border-radius:24px;
    padding:40px 30px;
    text-align:center;
    box-shadow:0 20px 50px rgba(15,59,113,.15);
}

.avatar{
    width:92px;
    height:92px;
    border-radius:50%;
    margin:0 auto 25px;
    background:#0F3B71;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    font-weight:700;
    letter-spacing:1px;
}

h1{
    color:#0F3B71;
    font-size:31px;
    margin-bottom:8px;
}

h2{
    color:#666;
    font-size:18px;
    font-weight:500;
    margin-bottom:28px;
}

.company{
    color:#555;
    line-height:1.7;
    margin-bottom:30px;
}

.button{
    display:block;
    width:100%;
    background:#0F3B71;
    color:white;
    text-decoration:none;
    padding:16px;
    margin-top:14px;
    border-radius:14px;
    font-weight:600;
    font-size:16px;
    transition:.2s;
}

.button:hover{
    background:#1b4f8c;
    transform:translateY(-2px);
}

.footer{
    margin-top:30px;
    color:#9ca3af;
    font-size:13px;
}
</style>

</head>

<body>
